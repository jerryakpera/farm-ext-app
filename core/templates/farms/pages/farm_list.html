{% extends "base.html" %}

{% block content %}
<div class="container-main py-8 sm:py-12">

  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">My Farms</h1>
    <a href="{% url 'farms:farm_create' %}"
       class="bg-green-600 hover:bg-green-700 text-white text-sm font-medium
              px-4 py-2 rounded-md transition-colors">
      + Add Farm
    </a>
  </div>

  {% for message in messages %}
    <div class="mb-4 px-4 py-3 rounded-md bg-green-50 text-green-800 text-sm border border-green-200">
      {{ message }}
    </div>
  {% endfor %}

  {% if farms %}
    <div class="grid gap-4 sm:grid-cols-2">
      {% for farm in farms %}
        {% include "farms/components/farm_card.html" %}
      {% endfor %}
    </div>
  {% else %}
    <p class="text-gray-500 text-sm">You have not added any farms yet.</p>
  {% endif %}

</div>
{% endblock %}
