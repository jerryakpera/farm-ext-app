<form method="get">

  <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">

    <div>
      <label for="{{ filter.form.search.id_for_label }}"
             class="block text-sm font-medium text-gray-700 mb-1">
        Search
      </label>

      <div class="[&>input]:w-full [&>input]:border [&>input]:border-gray-300
                  [&>input]:rounded-md [&>input]:px-3 [&>input]:py-2
                  [&>input]:text-sm [&>input]:focus:outline-none
                  [&>input]:focus:ring-2 [&>input]:focus:ring-green-500">
        {{ filter.form.search }}
      </div>
    </div>

    <div>
      <label for="{{ filter.form.lga.id_for_label }}"
             class="block text-sm font-medium text-gray-700 mb-1">
        LGA
      </label>

      <div class="[&>select]:w-full [&>select]:border [&>select]:border-gray-300
                  [&>select]:rounded-md [&>select]:px-3 [&>select]:py-2
                  [&>select]:text-sm [&>select]:focus:outline-none
                  [&>select]:focus:ring-2 [&>select]:focus:ring-green-500">
        {{ filter.form.lga }}
      </div>
    </div>

    <div>
      <label for="{{ filter.form.ward.id_for_label }}"
             class="block text-sm font-medium text-gray-700 mb-1">
        Ward
      </label>

      <div class="[&>select]:w-full [&>select]:border [&>select]:border-gray-300
                  [&>select]:rounded-md [&>select]:px-3 [&>select]:py-2
                  [&>select]:text-sm [&>select]:focus:outline-none
                  [&>select]:focus:ring-2 [&>select]:focus:ring-green-500">
        {{ filter.form.ward }}
      </div>
    </div>

    <div>
      <label for="{{ filter.form.primary_crop.id_for_label }}"
             class="block text-sm font-medium text-gray-700 mb-1">
        Primary Crop
      </label>

      <div class="[&>select]:w-full [&>select]:border [&>select]:border-gray-300
                  [&>select]:rounded-md [&>select]:px-3 [&>select]:py-2
                  [&>select]:text-sm [&>select]:focus:outline-none
                  [&>select]:focus:ring-2 [&>select]:focus:ring-green-500">
        {{ filter.form.primary_crop }}
      </div>
    </div>

    <div>
      <label for="{{ filter.form.animals.id_for_label }}"
             class="block text-sm font-medium text-gray-700 mb-1">
        Animal
      </label>

      <div class="[&>select]:w-full [&>select]:border [&>select]:border-gray-300
                  [&>select]:rounded-md [&>select]:px-3 [&>select]:py-2
                  [&>select]:text-sm [&>select]:focus:outline-none
                  [&>select]:focus:ring-2 [&>select]:focus:ring-green-500">
        {{ filter.form.animals }}
      </div>
    </div>

    <div>
      <label for="{{ filter.form.is_verified.id_for_label }}"
             class="block text-sm font-medium text-gray-700 mb-1">
        Verification Status
      </label>

      <div class="[&>select]:w-full [&>select]:border [&>select]:border-gray-300
                  [&>select]:rounded-md [&>select]:px-3 [&>select]:py-2
                  [&>select]:text-sm [&>select]:focus:outline-none
                  [&>select]:focus:ring-2 [&>select]:focus:ring-green-500">
        {{ filter.form.is_verified }}
      </div>
    </div>

  </div>

  <div class="flex items-center gap-3 mt-4">

    <button type="submit"
            class="bg-green-600 hover:bg-green-700 text-white font-medium
                   py-2 px-5 rounded-md transition-colors text-sm">
      Apply Filters
    </button>

    <a href="{% url 'farms:all_farms_list' %}"
       class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium
              py-2 px-5 rounded-md transition-colors text-sm">
      Clear Filters
    </a>

  </div>

</form>
