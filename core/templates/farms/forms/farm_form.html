<form method="post" enctype="multipart/form-data" class="space-y-5">
  {% csrf_token %}
  {% for field in form %}
    <div>
      <label for="{{ field.id_for_label }}"
             class="block text-sm font-medium text-gray-700 mb-1">
        {{ field.label }}
      </label>
      {% if field.name == "other_crops" %}
        <div class="flex flex-wrap gap-2 mt-1">
          {% for choice in field %}
            <label class="flex items-center gap-1.5 cursor-pointer border border-gray-300
                          rounded-full px-3 py-1 text-sm has-[:checked]:bg-green-600
                          has-[:checked]:text-white has-[:checked]:border-green-600
                          transition-colors">
              {{ choice.tag }}
              {{ choice.choice_label }}
            </label>
          {% endfor %}
        </div>
      {% else %}
        <div class="[&>input]:w-full [&>input]:border [&>input]:border-gray-300
                    [&>input]:rounded-md [&>input]:px-3 [&>input]:py-2 [&>input]:text-sm
                    [&>input]:focus:outline-none [&>input]:focus:ring-2
                    [&>input]:focus:ring-green-500
                    [&>select]:w-full [&>select]:border [&>select]:border-gray-300
                    [&>select]:rounded-md [&>select]:px-3 [&>select]:py-2 [&>select]:text-sm
                    [&>textarea]:w-full [&>textarea]:border [&>textarea]:border-gray-300
                    [&>textarea]:rounded-md [&>textarea]:px-3 [&>textarea]:py-2
                    [&>textarea]:text-sm">
          {{ field }}
        </div>
      {% endif %}
      {% if field.help_text %}
        <p class="mt-1 text-xs text-gray-400">{{ field.help_text }}</p>
      {% endif %}
      {% for error in field.errors %}
        <p class="mt-1 text-xs text-red-600">{{ error }}</p>
      {% endfor %}
    </div>
  {% endfor %}
  <div class="flex gap-3 pt-2">
    <button type="submit"
            class="bg-green-600 hover:bg-green-700 text-white font-medium
                   py-2 px-5 rounded-md transition-colors text-sm">
      Save
    </button>
    <a href="{% url 'farms:farm_list' %}"
       class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium
              py-2 px-5 rounded-md transition-colors text-sm">
      Cancel
    </a>
  </div>
</form>
