{% extends "base.html" %}
{% block content %}
  <div class="max-w-2xl mx-auto px-4 py-8">
    <a href="{% url 'visits:detail' pk=visit.pk %}"
      class="text-sm text-green-600 hover:underline">&larr; Back to visit</a>
    <h1 class="text-2xl font-bold text-gray-800 mt-2 mb-6">Add Crop Analysis</h1>
    <form method="post" class="space-y-5">
      {% csrf_token %}
      {% include "visits/_form_fields.html" %}
      <div class="flex gap-3 pt-2">
        <button type="submit"
                class="bg-green-600 hover:bg-green-700 text-white font-medium
                      py-2 px-5 rounded-md transition-colors text-sm">
          Save Analysis
        </button>
        <a href="{% url 'visits:detail' pk=visit.pk %}"
          class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium
                  py-2 px-5 rounded-md transition-colors text-sm">
          Cancel
        </a>
      </div>
    </form>
  </div>
{% endblock %}
