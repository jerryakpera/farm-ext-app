<div>
  <div class="-space-y-1">
    {{ field.label_tag }}

    {{ field }}

    {% if field.help_text %}
      <p class="text-xs text-gray-700 leading-4">
        {{ field.help_text }}
      </p>
    {% endif %}
  </div>

  {% if field.errors %}
    <div class="text-red-600 font-semibold text-xs" style="font-size: 0.8em">
      {{ field.errors|striptags }}
    </div>
  {% endif %}
</div>
