{# ------------------------------------------------------------------ #}
{# Flash messages                                                      #}
{# ------------------------------------------------------------------ #}
{% if messages %}
  <div class="mx-auto mt-4 w-full max-w-7xl px-4 sm:px-6 lg:px-8 space-y-2"
        aria-live="polite">
    {% for message in messages %}
      <div class="flex items-start gap-3 rounded-lg border px-4 py-3 text-sm
        {% if message.tags == 'success' %}bg-success-light border-success text-success
        {% elif message.tags == 'error' %}bg-danger-light border-danger text-danger
        {% elif message.tags == 'warning' %}bg-warning-light border-warning text-warning
        {% else %}bg-info-light border-info text-info{% endif %}">
        <span>{{ message }}</span>
      </div>
    {% endfor %}
  </div>
{% endif %}
