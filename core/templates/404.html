{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
  <div class="min-h-[60vh] flex flex-col items-center justify-center text-center px-4 py-16">
    <p class="text-7xl font-bold text-gray-200 mb-4">404</p>
    <h1 class="text-2xl font-bold text-gray-800 mb-2">Page not found</h1>
    <p class="text-sm text-gray-500 max-w-sm mb-8">
      The page you are looking for does not exist or may have been moved.
    </p>
    <a href="/"
      class="inline-flex items-center gap-2 bg-green-600 hover:bg-green-700
              text-white text-sm font-medium px-5 py-2.5 rounded-md transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
          viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7m-9 5v6"/>
      </svg>
      Back to home
    </a>
  </div>
{% endblock %}
