{% extends "base.html" %}

{% block content %}
  <div class="container-main py-12 pb-24 sm:pb-12">

    <a href="{% url 'questions:question_detail' question.pk %}"
      class="inline-flex items-center gap-1 text-sm text-gray-500
              hover:text-green-700 mb-6">
      <svg xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor">
        <path stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 19l-7-7 7-7"/>
      </svg>

      Back to Question
    </a>

    <h1 class="text-2xl font-bold text-gray-800 mb-6">
      Edit Question
    </h1>

    <div class="bg-white border border-gray-200 rounded-xl p-6">
      {% include "questions/forms/question_form.html" with submit_label="Save Changes" cancel_url=question.get_absolute_url %}
    </div>

  </div>
{% endblock %}
