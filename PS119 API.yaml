        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryVerse'
          description: ''
    patch:
      operationId: memory_verses_partial_update
      description: ViewSet for managing MemoryVerse resources.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Memory Verse.
        required: true
      tags:
      - memory-verses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMemoryVerseAdminRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMemoryVerseAdminRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMemoryVerseAdminRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryVerseAdmin'
          description: ''
    delete:
      operationId: memory_verses_destroy
      description: ViewSet for managing MemoryVerse resources.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Memory Verse.
        required: true
      tags:
      - memory-verses
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/topics/:
    get:
      operationId: topics_list
      description: |-
        CRUD for topics.

        Topics are shared system-wide — any authenticated user can read them,
        but only admins can create, update, or delete them.

        Endpoints:
        GET    /topics/        list all topics
        GET    /topics/<pk>/   retrieve a single topic
        POST   /topics/        create a topic (admin only)
        PATCH  /topics/<pk>/   update a topic (admin only)
        DELETE /topics/<pk>/   delete a topic (admin only)
      parameters:
      - in: query
        name: name
        schema:
          type: string
        description: Name
      - in: query
        name: ordering
        schema:
          type: array
          items:
            type: string
            enum:
            - -created_at
            - -name
            - created_at
            - name
        description: |-
          Ordering

          * `name` - Name
          * `-name` - Name (descending)
          * `created_at` - Created at
          * `-created_at` - Created at (descending)
        explode: false
        style: form
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - topics
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTopicList'
          description: ''
    post:
      operationId: topics_create
      description: |-
        CRUD for topics.

        Topics are shared system-wide — any authenticated user can read them,
        but only admins can create, update, or delete them.

        Endpoints:
        GET    /topics/        list all topics
        GET    /topics/<pk>/   retrieve a single topic
        POST   /topics/        create a topic (admin only)
        PATCH  /topics/<pk>/   update a topic (admin only)
        DELETE /topics/<pk>/   delete a topic (admin only)
      tags:
      - topics
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopicRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TopicRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TopicRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Topic'
          description: ''
