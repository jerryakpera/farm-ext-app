    PatchedMemoryVerseAdminRequest:
      type: object
      description: |-
        Admin serializer for controlled updates of MemoryVerse.

        Only ``topics`` is writable. All other fields are read-only.
        Topics are accepted as a list of Topic primary keys.
      properties:
        topics:
          type: array
          items:
            type: integer
          description: Optional topic classifications for this verse selection.
    PatchedTopicRequest:
      type: object
      description: |-
        Read and write representation of a Topic.

        Validation:
        - Name may not be blank or whitespace-only.
        - Name must be unique regardless of case (Faith, faith, FAITH are duplicates).
        - Name is stored in title case for consistency.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
    PatchedUserVerseOrderRequest:
      type: object
      description: |-
        Allows updating the queue `order` of a UserVerse only.
        Used for manual reordering and the 'learn next' action.
      properties:
        order:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Queue position within the user's verse list. Lower values appear
            first. Not required to be contiguous or positive.
    PatchedUserVerseTopicsRequest:
      type: object
      description: |-
        Allows a user to set or clear their personal topic overrides for a verse.

        Accepts a list of Topic PKs. Passing an empty list clears the override
        and restores inheritance from the memory verse's system-wide topics.
      properties:
        topics:
          type: array
          items:
            type: integer
    TallyIncrement:
      type: object
      description: |-
        Validates an optional tally increment count.

        If `count` is omitted the view defaults to incrementing by 1.
        The count may not exceed the remaining daily target.
      properties:
        count:
          type: integer
          minimum: 1
          default: 1
          description: Number of recitations to add. Defaults to 1.
    TallyIncrementRequest:
      type: object
      description: |-
        Validates an optional tally increment count.

        If `count` is omitted the view defaults to incrementing by 1.
        The count may not exceed the remaining daily target.
      properties:
        count:
          type: integer
          minimum: 1
          default: 1
          description: Number of recitations to add. Defaults to 1.
