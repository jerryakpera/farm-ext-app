          description: No response body
  /api/user-verses/:
    get:
      operationId: user_verses_list
      description: |-
        CRUD + custom actions for a user's personal verse library.

        Endpoints:
        GET    /user-verses/                  list
        POST   /user-verses/                  create (add to backlog)
        GET    /user-verses/<pk>/             retrieve
        PATCH  /user-verses/<pk>/             partial_update (order only)
        DELETE /user-verses/<pk>/             destroy
        POST   /user-verses/<pk>/learn-today/ mark verse as started today
        POST   /user-verses/<pk>/learn-next/  requeue verse to front of backlog
        POST   /user-verses/<pk>/tally/       increment recitation tally
        PATCH  /user-verses/<pk>/topics/      set user topic overrides
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - user-verses
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserVerseReadList'
          description: ''
    post:
      operationId: user_verses_create
      description: |-
        Add a verse to the user's backlog.

        Parameters
        ----------
        request : Request
            The HTTP request containing the payload.
        *args : tuple
            Additional positional arguments.
        **kwargs : dict
            Additional keyword arguments.

        Returns
        -------
        Response
            Serialized representation of the created UserVerse.
      tags:
      - user-verses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserVerseWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserVerseWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserVerseWriteRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserVerseWrite'
          description: ''
  /api/user-verses/{id}/:
    get:
      operationId: user_verses_retrieve
      description: |-
        CRUD + custom actions for a user's personal verse library.

        Endpoints:
        GET    /user-verses/                  list
        POST   /user-verses/                  create (add to backlog)
        GET    /user-verses/<pk>/             retrieve
        PATCH  /user-verses/<pk>/             partial_update (order only)
        DELETE /user-verses/<pk>/             destroy
        POST   /user-verses/<pk>/learn-today/ mark verse as started today
        POST   /user-verses/<pk>/learn-next/  requeue verse to front of backlog
        POST   /user-verses/<pk>/tally/       increment recitation tally
        PATCH  /user-verses/<pk>/topics/      set user topic overrides
