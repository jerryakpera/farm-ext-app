        Accepts a list of Topic PKs. Passing an empty list clears the override
        and restores inheritance from the memory verse's system-wide topics.
      properties:
        topics:
          type: array
          items:
            type: integer
      required:
      - topics
    UserVerseWrite:
      type: object
      description: |-
        Handles creation of a UserVerse (adding a verse to the user's backlog).

        Enforces:
        - No duplicate (user, memory_verse) pair — clean 400 instead of DB 500.
        - Memory verse must not exceed 3 consecutive verses in length.
      properties:
        memory_verse:
          type: integer
        topics:
          type: array
          items:
            type: integer
      required:
      - memory_verse
    UserVerseWriteRequest:
      type: object
      description: |-
        Handles creation of a UserVerse (adding a verse to the user's backlog).

        Enforces:
        - No duplicate (user, memory_verse) pair — clean 400 instead of DB 500.
        - Memory verse must not exceed 3 consecutive verses in length.
      properties:
        memory_verse:
          type: integer
        topics:
          type: array
          items:
            type: integer
      required:
      - memory_verse
    VersionEnum:
      enum:
      - ENGWEBP
      - eng_kjv
      type: string
      description: |-
        * `ENGWEBP` - World English Bible
        * `eng_kjv` - King James Version
