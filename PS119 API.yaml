openapi: 3.0.3
info:
  title: PS119 API
  version: 0.1.0
  description: Bible verse memorisation API
paths:
  /api/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/memory-verses/:
    get:
      operationId: memory_verses_list
      description: ViewSet for managing MemoryVerse resources.
      parameters:
      - in: query
        name: book
        schema:
          type: string
          enum:
          - 1CH
          - 1CO
          - 1JN
          - 1KI
          - 1PE
          - 1SA
          - 1TH
          - 1TI
          - 2CH
          - 2CO
          - 2JN
          - 2KI
          - 2PE
          - 2SA
          - 2TH
          - 2TI
          - 3JN
          - ACT
          - AMO
          - COL
          - DAN
          - DEU
          - ECC
          - EPH
          - EST
          - EXO
          - EZK
          - EZR
          - GAL
          - GEN
          - HAB
          - HAG
          - HEB
          - HOS
          - ISA
          - JAS
          - JDG
          - JER
          - JHN
          - JOB
          - JOL
          - JON
          - JOS
          - JUD
          - LAM
          - LEV
          - LUK
          - MAL
          - MAT
          - MIC
          - MRK
          - NAM
          - NEH
          - NUM
          - OBA
          - PHM
          - PHP
          - PRO
          - PSA
          - REV
          - ROM
          - RUT
          - SNG
          - TIT
          - ZEC
          - ZEP
        description: |-
          Book

          * `GEN` - Genesis
          * `EXO` - Exodus
          * `LEV` - Leviticus
          * `NUM` - Numbers
          * `DEU` - Deuteronomy
          * `JOS` - Joshua
          * `JDG` - Judges
          * `RUT` - Ruth
          * `1SA` - 1 Samuel
          * `2SA` - 2 Samuel
          * `1KI` - 1 Kings
          * `2KI` - 2 Kings
          * `1CH` - 1 Chronicles
          * `2CH` - 2 Chronicles
          * `EZR` - Ezra
          * `NEH` - Nehemiah
          * `EST` - Esther
          * `JOB` - Job
          * `PSA` - Psalms
          * `PRO` - Proverbs
          * `ECC` - Ecclesiastes
          * `SNG` - Song of Solomon
          * `ISA` - Isaiah
          * `JER` - Jeremiah
          * `LAM` - Lamentations
          * `EZK` - Ezekiel
          * `DAN` - Daniel
          * `HOS` - Hosea
          * `JOL` - Joel
          * `AMO` - Amos
          * `OBA` - Obadiah
          * `JON` - Jonah
          * `MIC` - Micah
          * `NAM` - Nahum
          * `HAB` - Habakkuk
          * `ZEP` - Zephaniah
          * `HAG` - Haggai
          * `ZEC` - Zechariah
          * `MAL` - Malachi
          * `MAT` - Matthew
          * `MRK` - Mark
          * `LUK` - Luke
          * `JHN` - John
          * `ACT` - Acts
          * `ROM` - Romans
          * `1CO` - 1 Corinthians
          * `2CO` - 2 Corinthians
          * `GAL` - Galatians
          * `EPH` - Ephesians
          * `PHP` - Philippians
          * `COL` - Colossians
          * `1TH` - 1 Thessalonians
          * `2TH` - 2 Thessalonians
          * `1TI` - 1 Timothy
          * `2TI` - 2 Timothy
          * `TIT` - Titus
          * `PHM` - Philemon
          * `HEB` - Hebrews
          * `JAS` - James
          * `1PE` - 1 Peter
          * `2PE` - 2 Peter
          * `1JN` - 1 John
          * `2JN` - 2 John
          * `3JN` - 3 John
          * `JUD` - Jude
          * `REV` - Revelation
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: topic
        schema:
          type: integer
        description: Topic ID
      - in: query
        name: version
        schema:
          type: string
          enum:
          - ENGWEBP
          - eng_kjv
        description: |-
          Version

          * `ENGWEBP` - World English Bible
          * `eng_kjv` - King James Version
      tags:
      - memory-verses
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMemoryVerseList'
          description: ''
    post:
      operationId: memory_verses_create
      description: |-
        Create a new MemoryVerse instance from validated request data.

        Parameters
        ----------
        request : Request
            The incoming HTTP request.
        *args
            Additional positional arguments.
        **kwargs
            Additional keyword arguments.

        Returns
        -------
        Response
            The HTTP response containing the created MemoryVerse data or an error message.
      tags:
      - memory-verses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryVerseCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MemoryVerseCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MemoryVerseCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryVerseCreate'
          description: ''
  /api/memory-verses/{id}/:
    get:
      operationId: memory_verses_retrieve
      description: ViewSet for managing MemoryVerse resources.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Memory Verse.
        required: true
      tags:
      - memory-verses
      security:
      - jwtAuth: []
      - cookieAuth: []
