    MemoryVerse:
      type: object
      description: Read-only serializer for MemoryVerse responses.
      properties:
        id:
          type: integer
          readOnly: true
        reference:
          type: string
          readOnly: true
        display_text:
          type: string
          readOnly: true
        version:
          type: object
          additionalProperties: {}
          description: |-
            Return a structured object for the Bible version.

            Parameters
            ----------
            obj : MemoryVerse
                The instance being serialized.

            Returns
            -------
            dict
                Example::

                    {
                        "value": "ENGWEBP",
                        "label": "World English Bible"
                    }
          readOnly: true
        book:
          type: string
          readOnly: true
        chapter:
          type: integer
          readOnly: true
        verse_start_num:
          type: integer
          readOnly: true
        verse_end_num:
          type: integer
          readOnly: true
        topics:
          type: array
          items:
            $ref: '#/components/schemas/Topic'
          readOnly: true
        created_by:
          type: integer
          readOnly: true
          nullable: true
          description: The user who first added this selection to the database.
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - book
      - chapter
      - created_at
      - created_by
      - display_text
      - id
      - reference
      - topics
      - verse_end_num
      - verse_start_num
      - version
    MemoryVerseAdmin:
      type: object
      description: |-
        Admin serializer for controlled updates of MemoryVerse.

        Only ``topics`` is writable. All other fields are read-only.
        Topics are accepted as a list of Topic primary keys.
      properties:
        topics:
          type: array
          items:
            type: integer
          description: Optional topic classifications for this verse selection.
    MemoryVerseCreate:
