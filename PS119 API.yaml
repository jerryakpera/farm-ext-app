        -------
        Response
            Updated UserVerse representation on success.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - user-verses
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserVerseRead'
          description: ''
  /api/user-verses/{id}/tally/:
    post:
      operationId: user_verses_tally_create
      description: |-
        Increment the recitation tally for a verse.

        Parameters
        ----------
        request : Request
            The HTTP request containing the increment payload.
        pk : int
            Primary key of the UserVerse.

        Returns
        -------
        Response
            Updated UserVerse representation.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - user-verses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TallyIncrementRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TallyIncrementRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TallyIncrementRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TallyIncrement'
          description: ''
  /api/user-verses/{id}/topics/:
    patch:
      operationId: user_verses_topics_partial_update
      description: |-
        Update or clear user-specific topic overrides for a verse.

        Parameters
        ----------
        request : Request
            The HTTP request containing topic data.
        pk : int
            Primary key of the UserVerse.

        Returns
        -------
        Response
            Updated UserVerse representation.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - user-verses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserVerseTopicsRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserVerseTopicsRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserVerseTopicsRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserVerseTopics'
          description: ''
