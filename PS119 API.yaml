      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/user-verses/{id}/learn-next/:
    post:
      operationId: user_verses_learn_next_create
      description: |-
        Move a verse to the front of the user's backlog queue.

        Parameters
        ----------
        request : Request
            The HTTP request.
        pk : int
            Primary key of the UserVerse.

        Returns
        -------
        Response
            Updated UserVerse representation.
      parameters:
