    UserVerseRead:
      type: object
      description: Read-only representation of a UserVerse, including all computed
        properties.
      properties:
        id:
          type: integer
          readOnly: true
        memory_verse:
          allOf:
          - $ref: '#/components/schemas/MemoryVerse'
          readOnly: true
        order:
          type: integer
          readOnly: true
          description: Queue position within the user's verse list. Lower values appear
            first. Not required to be contiguous or positive.
        tally:
          type: integer
          readOnly: true
          description: Cumulative number of times the user has recited this verse.
        phase:
          type: string
          readOnly: true
        topics:
          type: array
          items:
            $ref: '#/components/schemas/Topic'
          readOnly: true
        effective_topics:
          type: array
          items:
            $ref: '#/components/schemas/Topic'
          readOnly: true
        is_mastered:
          type: boolean
          readOnly: true
        is_not_started:
          type: boolean
          readOnly: true
        daily_target:
          type: integer
          readOnly: true
        learned_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        last_practiced_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - daily_target
      - effective_topics
      - id
      - is_mastered
      - is_not_started
      - last_practiced_at
      - learned_at
      - memory_verse
