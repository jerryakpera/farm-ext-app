        name: id
        schema:
          type: string
        required: true
      tags:
      - user-verses
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserVerseRead'
          description: ''
  /api/user-verses/{id}/learn-today/:
